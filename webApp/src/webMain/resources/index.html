<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeBass</title>
    <link type="text/css" rel="stylesheet" href="styles.css">
    <!-- pdf.js CDN 라이브러리 추가 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body style="text-align: center; align-content: center; margin: 0; padding: 0;">
    <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 50 50" role="presentation">
        <circle cx="25" cy="25" r="20" stroke="#ccc" stroke-width="4" fill="none"/>
        <circle cx="25" cy="25" r="20" stroke="#333" stroke-width="4" fill="none" stroke-linecap="round"
                stroke-dasharray="90 125">
            <animateTransform attributeName="transform" type="rotate" from="0 25 25" to="360 25 25" dur="1s"
                               repeatCount="indefinite"/>
        </circle>
    </svg>

    <!-- 유튜브 플레이어 오버레이 컨테이너 -->
    <div id="youtube-player-container" style="position: absolute; left: 24px; top: 100px; width: 37%; height: 240px; z-index: 100; display: none; background: #000; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.3);">
        <div id="yt-player" style="width: 100%; height: 100%;"></div>
    </div>

    <!-- PDF 뷰어 오버레이 컨테이너 -->
    <div id="pdf-viewer-container" style="position: absolute; right: 24px; top: 100px; width: 55%; height: calc(100vh - 140px); z-index: 100; display: none; background: #eee; overflow-y: scroll; border-radius: 8px; border: 1px solid #ccc; box-shadow: 0 4px 10px rgba(0,0,0,0.15);"></div>

    <!-- 숨겨진 파일 업로드 입력 폼 -->
    <input type="file" id="pdf-upload-input" accept="application/pdf" style="display: none;">

    <!-- YouTube IFrame API 및 Kotlin Bridge Script -->
    <script>
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        window.initYoutubePlayer = function(videoId) {
            var container = document.getElementById('youtube-player-container');
            if (container) {
                container.style.display = 'block';
            }
            
            if (player && typeof player.loadVideoById === 'function') {
                player.loadVideoById(videoId);
                return;
            }

            var checkAPI = setInterval(function() {
                if (typeof YT !== 'undefined' && YT.Player) {
                    clearInterval(checkAPI);
                    player = new YT.Player('yt-player', {
                        height: '100%',
                        width: '100%',
                        videoId: videoId,
                        events: {
                            'onReady': onPlayerReady,
                            'onStateChange': onPlayerStateChange
                        }
                    });
                }
            }, 100);
        };

        function onPlayerReady(event) {
            setInterval(function() {
                if (player && typeof player.getCurrentTime === 'function') {
                    var currentTime = player.getCurrentTime();
                    if (typeof window.onYoutubeTimeUpdate === 'function') {
                        window.onYoutubeTimeUpdate(currentTime);
                    }
                }
            }, 100);
        }

        function onPlayerStateChange(event) {
            var isPlaying = (event.data == YT.PlayerState.PLAYING);
            if (typeof window.onYoutubeStateChange === 'function') {
                window.onYoutubeStateChange(isPlaying);
            }
        }

        // ------------------ PDF.js 및 스크롤 Bridge 연동 ------------------
        var pdfDoc = null;
        var pdfContainer = document.getElementById('pdf-viewer-container');

        window.initPdfViewer = function(pdfUrl) {
            pdfContainer = document.getElementById('pdf-viewer-container');
            if (pdfContainer) {
                pdfContainer.style.display = 'block';
                pdfContainer.innerHTML = '<div style="padding: 20px; text-align: center;">악보 로딩 중...</div>';
            }

            var checkPdfLib = setInterval(function() {
                if (typeof pdfjsLib !== 'undefined') {
                    clearInterval(checkPdfLib);
                    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
                    
                    pdfjsLib.getDocument(pdfUrl).promise.then(function(pdfDoc_) {
                        pdfDoc = pdfDoc_;
                        if (pdfContainer) pdfContainer.innerHTML = '';
                        renderAllPages();
                    }).catch(function(error) {
                        console.error('PDF 로드 실패:', error);
                        if (pdfContainer) {
                            pdfContainer.innerHTML = '<div style="padding: 20px; color: red;">PDF 파일을 로드할 수 없습니다.<br>파일 규격을 확인해 주세요.</div>';
                        }
                    });
                }
            }, 100);
        };

        function renderAllPages() {
            if (!pdfDoc) return;
            for (var i = 1; i <= pdfDoc.numPages; i++) {
                renderPage(i);
            }
        }

        function renderPage(pageNum) {
            pdfDoc.getPage(pageNum).then(function(page) {
                var viewport = page.getViewport({ scale: 1.5 });
                var canvas = document.createElement('canvas');
                var ctx = canvas.getContext('2d');
                canvas.height = viewport.height;
                canvas.width = viewport.width;
                canvas.style.display = 'block';
                canvas.style.margin = '16px auto';
                canvas.style.boxShadow = '0 2px 8px rgba(0,0,0,0.15)';
                canvas.style.backgroundColor = '#fff';
                canvas.style.width = '90%';

                if (pdfContainer) {
                    pdfContainer.appendChild(canvas);
                }

                var renderContext = {
                    canvasContext: ctx,
                    viewport: viewport
                };
                page.render(renderContext);
            });
        }

        // 스크롤 이동 연동
        window.scrollToPdfPixel = function(pixel) {
            pdfContainer = document.getElementById('pdf-viewer-container');
            if (pdfContainer) {
                pdfContainer.scrollTo({
                    top: pixel,
                    behavior: 'smooth'
                });
            }
        };

        // 스크롤 이벤트 수집
        var bindScroll = setInterval(function() {
            pdfContainer = document.getElementById('pdf-viewer-container');
            if (pdfContainer) {
                clearInterval(bindScroll);
                pdfContainer.addEventListener('scroll', function() {
                    if (typeof window.onPdfScroll === 'function') {
                        window.onPdfScroll(pdfContainer.scrollTop);
                    }
                });
            }
        }, 100);

        // ------------------ PDF 업로드 트리거 및 파일선택 Bridge ------------------
        window.triggerPdfUpload = function() {
            var fileInput = document.getElementById('pdf-upload-input');
            if (fileInput) {
                fileInput.click();
            }
        };

        var bindFileInput = setInterval(function() {
            var fileInput = document.getElementById('pdf-upload-input');
            if (fileInput) {
                clearInterval(bindFileInput);
                fileInput.addEventListener('change', function(event) {
                    var file = event.target.files[0];
                    if (file && file.type === 'application/pdf') {
                        var objectUrl = URL.createObjectURL(file);
                        if (typeof window.onPdfFileSelected === 'function') {
                            window.onPdfFileSelected(file.name);
                        }
                        window.initPdfViewer(objectUrl);
                    }
                });
            }
        }, 100);
    </script>

    <script type="application/javascript" src="webApp.js"></script>
</body>
</html>
